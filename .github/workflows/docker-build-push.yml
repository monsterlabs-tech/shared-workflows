name: Docker Build & Push (reusable)

# Builds a Docker image and pushes it to GHCR. The caller passes the
# repo-relative image name; tags are derived from inputs + sensible defaults
# (sha, branch, semver).

on:
  workflow_call:
    inputs:
      image:
        description: "Image name (without registry/owner). e.g. admin-api"
        required: true
        type: string
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      build-args:
        description: "Newline-separated KEY=VALUE list"
        required: false
        type: string
        default: ""
      tag:
        description: "Explicit tag (e.g. semver from semantic-release). Optional."
        required: false
        type: string
        default: ""
      runs-on:
        description: |
          JSON array of runner labels.
          Single label:  '["ubuntu-latest"]'
          Multi label:   '["self-hosted", "maxim"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'
    outputs:
      image-ref:
        description: "Fully qualified image reference (registry/owner/image:tag)"
        value: ${{ jobs.build.outputs.image-ref }}
      digest:
        value: ${{ jobs.build.outputs.digest }}
    secrets:
      ghcr-read-token:
        description: |
          Token with read:packages on monsterlabs-tech. Used to compose .npmrc
          for cross-repo @monsterlabs-tech/* package installs inside the Docker
          build. Image push to GHCR uses the workflow's GITHUB_TOKEN with the
          calling job's `permissions: packages: write`.
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    outputs:
      image-ref: ${{ steps.ref.outputs.image-ref }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      # Image push: use the workflow's GITHUB_TOKEN. The calling job has
      # `permissions: packages: write`, which gives GITHUB_TOKEN write access
      # to THIS repo's GHCR packages - which is what we push.
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build-time npm install: needs read:packages for OTHER @monsterlabs-tech
      # packages (eslint-config, models). Caller passes a low-scope read token.
      - name: Compose .npmrc for build-time GitHub Packages auth
        run: |
          cat > /tmp/build-npmrc <<EOF
          @monsterlabs-tech:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.ghcr-read-token || secrets.GITHUB_TOKEN }}
          EOF

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            ${{ inputs.tag != '' && format('type=raw,value={0}', inputs.tag) || '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.build-args }}
          # Mount .npmrc as a BuildKit secret. Dockerfiles that need to
          # install from @monsterlabs-tech use:
          #   RUN --mount=type=secret,id=npmrc,target=/root/.npmrc npm install
          # The secret is only mounted for that RUN; never written to a layer.
          secret-files: |
            npmrc=/tmp/build-npmrc

      - name: Resolve image-ref
        id: ref
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # First tag in the metadata-action output is the canonical reference.
          IMAGE_REF=$(echo "$TAGS" | head -n1)
          echo "image-ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Built: $IMAGE_REF"
