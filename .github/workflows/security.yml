name: Security

# Reusable security workflow. Two jobs:
# - dependency-audit: npm install (prod deps only, --ignore-scripts), then
#   npm audit; fails on any critical vulnerability, warns on high.
# - secret-scanning: gitleaks CLI across full history; fails on any leak.
#
# Usage from a consumer repo (.github/workflows/security.yml):
#   jobs:
#     security:
#       uses: monsterlabs-tech/shared-workflows/.github/workflows/security.yml@v1
#       secrets: inherit
#
# `secrets: inherit` forwards the caller's org/repo secrets by their
# original name. This workflow reads GHCR_READ_TOKEN directly (uppercase,
# matching the org-secret convention). If the caller uses an explicit
# `secrets:` block instead of inherit, they MUST forward GHCR_READ_TOKEN.

on:
  workflow_call:
    inputs:
      node-version:
        description: Node major.minor.patch used for the audit step
        type: string
        default: '22.14.0'
      skip-dependency-audit:
        description: Set true for repos without a package.json (terraform-only, docs-only)
        type: boolean
        default: false
      skip-secret-scanning:
        description: Set true to disable gitleaks (avoid except for emergencies)
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-audit:
    name: Dependency Audit
    if: ${{ !inputs.skip-dependency-audit }}
    runs-on: [self-hosted, maxim]
    steps:
      - name: Clean up stale git locks
        run: find . -name "*.lock" -type f -delete 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          clean: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          # No `cache: npm` - requires package-lock.json, which some service
          # repos don't ship. The audit job tolerates both.

      - name: Configure npm for GitHub Packages
        # Reads GHCR_READ_TOKEN from the caller (forwarded via secrets: inherit).
        # If empty, the .npmrc is not written; only repos with no private deps
        # will succeed in that mode.
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [ -n "$GHCR_READ_TOKEN" ]; then
            cat > .npmrc <<EOF
          @monsterlabs-tech:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=$GHCR_READ_TOKEN
          EOF
          fi

      - name: Clean node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        # npm install rather than npm ci so we work with or without a
        # package-lock.json. --ignore-scripts skips lifecycle hooks
        # (prepare/build); we only need the dep tree for audit.
        run: npm install --omit=dev --ignore-scripts --no-audit --no-fund

      - name: Run npm audit (high+critical)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(npm audit --omit=dev --json 2>/dev/null | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(npm audit --omit=dev --json 2>/dev/null | jq '.metadata.vulnerabilities.high // 0')
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found in production dependencies"
            exit 1
          fi

  secret-scanning:
    name: Secret Scanning
    if: ${{ !inputs.skip-secret-scanning }}
    runs-on: [self-hosted, maxim]
    steps:
      - name: Clean up stale git locks
        run: find . -name "*.lock" -type f -delete 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      # Run the gitleaks binary directly rather than gitleaks/gitleaks-action.
      # The action requires a license for org-owned repos and has unreliable
      # self-hosted-runner cleanup. The CLI is unrestricted and predictable.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.0
        run: |
          set -euo pipefail
          rm -rf /tmp/gitleaks-install && mkdir -p /tmp/gitleaks-install
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp/gitleaks-install
          sudo mv /tmp/gitleaks-install/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks Scan
        run: gitleaks detect --source . --redact --no-banner --exit-code 1
