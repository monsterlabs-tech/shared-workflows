name: Terraform Drift Detection (reusable)

# Runs `terraform plan -detailed-exitcode` against a stack and posts to Slack
# if drift is detected (exit code 2) or if the plan errors (exit code 1).
#
# Designed for scheduled use. The workflow itself always succeeds when drift
# is found (so the schedule stays armed); the noise channel for the actual
# drift signal is Slack + the workflow summary. Plan errors fail the job.
#
# Caller pattern (from monsterlabs-tech/devops/.github/workflows/drift.yml):
#
#   jobs:
#     foundations-dev:
#       uses: monsterlabs-tech/shared-workflows/.github/workflows/terraform-drift.yml@v1
#       with:
#         stack: account-foundations
#         environment: maxim-dev
#         aws-region: eu-west-2
#         role-to-assume: arn:aws:iam::<dev-acct>:role/<plan-role>
#         slack-channel-id: C0B3JLA7B6D  # #cicd
#       secrets: inherit
#
# Required org secret (read via secrets: inherit):
#   SLACK_BOT_TOKEN  - xoxb-... bot token with chat:write scope.
#                      The bot must be a member of the target channel.

on:
  workflow_call:
    inputs:
      stack:
        description: "Stack directory (e.g. network, ecs-platform)"
        required: true
        type: string
      environment:
        description: "Environment name matching environments/<env>/ (e.g. maxim-dev)"
        required: true
        type: string
      aws-region:
        required: true
        type: string
      role-to-assume:
        description: "Plan role ARN for this account. Must trust monsterlabs-tech/devops via OIDC."
        required: true
        type: string
      slack-channel-id:
        description: "Slack channel ID (e.g. C0B3JLA7B6D for #cicd). The bot must be a member of this channel."
        required: true
        type: string
      terraform-version:
        required: false
        type: string
        default: "1.10.0"

permissions:
  id-token: write
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=environments/${{ inputs.environment }}/backend.hcl

      - name: Terraform plan (detailed-exitcode)
        id: plan
        # -lock=false: drift detection is read-only; never block on a
        # concurrent apply's state lock.
        # -no-color: log readability + Slack message safety.
        # Exit code semantics: 0=clean, 1=error, 2=diff (= drift).
        run: |
          set +e
          terraform plan -detailed-exitcode -lock=false -no-color \
            -var-file=environments/${{ inputs.environment }}/terraform.tfvars \
            > plan.out 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat plan.out

      - name: Summarise outcome
        id: summary
        run: |
          case "${{ steps.plan.outputs.exit_code }}" in
            0) echo "status=clean" >> "$GITHUB_OUTPUT"; echo "::notice::No drift detected" ;;
            2) echo "status=drift" >> "$GITHUB_OUTPUT"; echo "::warning::Drift detected" ;;
            *) echo "status=error" >> "$GITHUB_OUTPUT"; echo "::error::Plan errored" ;;
          esac

      - name: Post to Slack
        if: steps.summary.outputs.status != 'clean'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL: ${{ inputs.slack-channel-id }}
          STATUS: ${{ steps.summary.outputs.status }}
          STACK: ${{ inputs.stack }}
          ENV: ${{ inputs.environment }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # Truncate the plan tail to ~2500 chars - Slack message limit is
          # ~3000 chars per block. The tail has the resource diffs.
          PLAN_TAIL=$(tail -c 2500 plan.out)

          if [ "$STATUS" = "drift" ]; then
            HEADER=":warning: *Drift detected* in \`${STACK}\` (\`${ENV}\`)"
            FALLBACK=":warning: Terraform drift detected: ${STACK} / ${ENV}"
          else
            HEADER=":x: *Drift check errored* for \`${STACK}\` (\`${ENV}\`) - plan did not complete"
            FALLBACK=":x: Drift check errored: ${STACK} / ${ENV}"
          fi

          # Build JSON safely with jq so the plan tail (which may contain
          # backticks, quotes, backslashes) doesn't break the payload.
          jq -n \
            --arg channel "$CHANNEL" \
            --arg fallback "$FALLBACK" \
            --arg header "$HEADER" \
            --arg repo "$REPO" \
            --arg run_url "$RUN_URL" \
            --arg plan_tail "$PLAN_TAIL" \
            '{
              channel: $channel,
              text: $fallback,
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: $header } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Repo*\n\($repo)" },
                    { type: "mrkdwn", text: "*Run*\n<\($run_url)|View logs>" }
                  ]
                },
                { type: "section", text: { type: "mrkdwn",
                    text: "*Plan tail* (last 2500 chars):\n```\n\($plan_tail)\n```"
                  }
                }
              ]
            }' > slack-payload.json

          RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data @slack-payload.json \
            "https://slack.com/api/chat.postMessage")
          echo "Slack API response: $RESPONSE"
          # Slack returns {"ok": true} on success. Fail loudly on error so
          # we surface bot-token / channel-membership issues immediately.
          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            ERR=$(echo "$RESPONSE" | jq -r '.error // "unknown"')
            echo "::error::Slack post failed: $ERR"
            exit 1
          fi

      - name: Fail job on plan error
        if: steps.summary.outputs.status == 'error'
        # Drift (exit 2) is informational and stays green. Plan errors (exit 1)
        # are real failures and must surface in the Actions UI.
        run: exit 1
