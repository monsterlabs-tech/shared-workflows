name: GHCR Image Cleanup (reusable)

# Keeps the most recent N versioned (semver-tagged) images for a GHCR
# package. SHA-only tags are left alone since they're cheap and useful
# for rollback.

on:
  workflow_call:
    inputs:
      package:
        description: "GHCR package name (org-scoped). e.g. admin-api"
        required: true
        type: string
      org:
        required: false
        type: string
        default: "monsterlabs-tech"
      keep:
        required: false
        type: number
        default: 5

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ inputs.package }}
          ORG: ${{ inputs.org }}
          KEEP: ${{ inputs.keep }}
        run: |
          set -euo pipefail
          VERSIONS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/orgs/${ORG}/packages/container/${PACKAGE}/versions" \
            --paginate \
            --jq '.[] | select(.metadata.container.tags | length > 0)
                       | select(.metadata.container.tags[] | test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))
                       | {id, tags: .metadata.container.tags, created: .created_at}' \
            | jq -s 'sort_by(.created) | reverse')

          TOTAL=$(echo "$VERSIONS" | jq 'length')
          echo "Found $TOTAL semver-tagged versions; keeping $KEEP"

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Nothing to delete"; exit 0
          fi

          echo "$VERSIONS" | jq -r ".[$KEEP:] | .[].id" | while read -r ID; do
            TAGS=$(echo "$VERSIONS" | jq -r ".[] | select(.id == $ID) | .tags | join(\", \")")
            echo "Deleting $ID (tags: $TAGS)"
            gh api --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/${ORG}/packages/container/${PACKAGE}/versions/${ID}" \
              || echo "Failed to delete $ID (continuing)"
          done
