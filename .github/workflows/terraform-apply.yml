name: Terraform Apply (reusable)

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
      environment:
        description: "Environment dir under environments/ (e.g. maxim-dev)"
        required: true
        type: string
      gh-environment:
        description: "GitHub Environment name (for protection rules / required reviewers). Optional."
        required: false
        type: string
        default: ""
      aws-region:
        required: true
        type: string
      role-to-assume:
        required: true
        type: string
      terraform-version:
        required: false
        type: string
        default: "1.10.0"
      working-directory-prefix:
        required: false
        type: string
        default: "."

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.gh-environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory-prefix }}/${{ inputs.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=environments/${{ inputs.environment }}/backend.hcl

      - name: Terraform apply
        run: terraform apply -var-file=environments/${{ inputs.environment }}/terraform.tfvars -auto-approve
